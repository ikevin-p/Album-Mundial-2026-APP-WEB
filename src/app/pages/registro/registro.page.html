<ion-content class="registro-content" [fullscreen]="true">
  <div class="registro-wrap">

    <div class="bg-grad"></div>

    <div class="franja-izq">
      <div class="f f1"></div>
      <div class="f f2"></div>
      <div class="f f3"></div>
    </div>
    <div class="franja-der">
      <div class="f f4"></div>
      <div class="f f5"></div>
    </div>

    <div class="contenido">

      <div class="page-header">
        <button class="back-btn" (click)="irLogin()">
          <ion-icon name="arrow-back-outline"></ion-icon>
          <span>Volver</span>
        </button>
        <div class="header-center">
          <img src="assets/logo-sinfondo.png" alt="FIFA 26" class="mini-logo">
          <div class="header-txts">
            <span class="page-titulo">Crear cuenta</span>
            <span class="page-sub">FIFA World Cup 2026 · Álbum Panini</span>
          </div>
        </div>
      </div>

      <!-- Google -->
      <button class="btn-google" (click)="registrarConGoogle()">
        <div class="google-svg">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#EA4335" d="M5.266,9.765C6.199,6.939 8.854,4.909 12,4.909C13.655,4.909 15.164,5.473 16.356,6.4L19.295,3.462C17.324,1.721 14.811,0.636 12,0.636C7.273,0.636 3.255,3.447 1.2,7.464L5.266,9.765Z"/>
            <path fill="#34A853" d="M16.041,18.013C14.951,18.716 13.566,19.091 12,19.091C8.866,19.091 6.219,17.077 5.277,14.268L1.237,16.525C3.253,20.576 7.273,23.364 12,23.364C14.7,23.364 17.218,22.393 19.164,20.618L16.041,18.013Z"/>
            <path fill="#4A90D9" d="M19.164,20.618C21.196,18.764 22.455,16.055 22.455,12C22.455,11.218 22.345,10.4 22.182,9.636L12,9.636L12,14.545L17.927,14.545C17.636,16.018 16.8,17.236 16.041,18.013L19.164,20.618Z"/>
            <path fill="#FBBC05" d="M5.277,14.268C5.038,13.556 4.909,12.794 4.909,12C4.909,11.218 5.034,10.467 5.266,9.765L1.2,7.464C0.436,9.009 0,10.745 0,12C0,13.218 0.436,14.927 1.237,16.525L5.277,14.268Z"/>
          </svg>
        </div>
        <span>Continuar con Google</span>
        <span class="rec-badge">Recomendado</span>
      </button>

      <div class="divider">
        <div class="div-line"></div>
        <span>o regístrate manualmente</span>
        <div class="div-line"></div>
      </div>

      <div class="form-wrap">

        <!-- Nombre completo — sin ejemplos de personas -->
        <div class="form-grupo">
          <label class="flabel">Nombre completo</label>
          <div class="ibox">
            <ion-icon name="person-outline" class="iico"></ion-icon>
            <input type="text" [(ngModel)]="nombre_real"
                   placeholder="Ingresa tu nombre completo"
                   autocomplete="off"/>
          </div>
        </div>

        <!-- Usuario — sin ejemplos de personas -->
        <div class="form-grupo">
          <label class="flabel">Nombre de usuario</label>
          <div class="ibox" [class.iok]="usernameOk" [class.ierr]="usernameTomado">
            <ion-icon name="at-outline" class="iico"></ion-icon>
            <input type="text" [(ngModel)]="username"
                   placeholder="Sin espacios ni puntos"
                   autocomplete="off"
                   (ngModelChange)="validarUsername()"/>
            <span class="ibadge ok"  *ngIf="usernameOk">✓</span>
            <span class="ibadge err" *ngIf="usernameTomado">✗</span>
          </div>
        </div>

        <!-- Email -->
        <div class="form-grupo">
          <label class="flabel">
            Correo electrónico
            <span class="opc">· opcional</span>
          </label>
          <div class="ibox">
            <ion-icon name="mail-outline" class="iico"></ion-icon>
            <input type="email" [(ngModel)]="email"
                   placeholder="correo@dominio.com"
                   autocomplete="email"/>
          </div>
        </div>

        <!-- Contraseña + confirmar en 2 columnas -->
        <div class="cols-2">
          <div class="form-grupo">
            <label class="flabel">Contraseña</label>
            <div class="ibox">
              <ion-icon name="lock-closed-outline" class="iico"></ion-icon>
              <input [type]="mostrarPass ? 'text' : 'password'"
                     [(ngModel)]="password"
                     placeholder="Mínimo 4 caracteres"
                     (ngModelChange)="calcularFuerza()"/>
              <button class="ojo" (click)="mostrarPass=!mostrarPass">
                <ion-icon [name]="mostrarPass ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>
            <div class="fuerza" *ngIf="password.length > 0">
              <div class="f-bar">
                <div class="f-fill" [style.width]="fuerzaPct+'%'" [style.background]="fuerzaColor"></div>
              </div>
              <span [style.color]="fuerzaColor">{{ fuerzaTexto }}</span>
            </div>
          </div>

          <div class="form-grupo">
            <label class="flabel">Confirmar</label>
            <div class="ibox" [class.ierr]="confirmar.length > 0 && password !== confirmar">
              <ion-icon name="shield-checkmark-outline" class="iico"></ion-icon>
              <input [type]="mostrarConfirmar ? 'text' : 'password'"
                     [(ngModel)]="confirmar"
                     placeholder="Repite la contraseña"/>
              <button class="ojo" (click)="mostrarConfirmar=!mostrarConfirmar">
                <ion-icon [name]="mostrarConfirmar ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
              </button>
            </div>
          </div>
        </div>

        <!-- Términos -->
        <div class="terminos" (click)="aceptaTerminos=!aceptaTerminos">
          <div class="chk" [class.on]="aceptaTerminos">
            <ion-icon name="checkmark-outline" *ngIf="aceptaTerminos"></ion-icon>
          </div>
          <span>Acepto los <span class="link-v">términos y condiciones</span></span>
        </div>

        <div class="msg-err" *ngIf="errorMsg">
          <ion-icon name="alert-circle-outline"></ion-icon>{{ errorMsg }}
        </div>
        <div class="msg-ok" *ngIf="exitoMsg">
          <ion-icon name="checkmark-circle-outline"></ion-icon>{{ exitoMsg }}
        </div>

        <button class="btn-crear" (click)="registrar()"
                [disabled]="cargando || !aceptaTerminos">
          <span *ngIf="!cargando">Crear mi álbum</span>
          <ion-icon *ngIf="cargando" name="reload-outline" class="spin"></ion-icon>
        </button>

        <p class="link-login">
          ¿Ya tienes cuenta?
          <span (click)="irLogin()">Inicia sesión</span>
        </p>

      </div>

      <div class="panini-wrap">
        <img src="assets/panini-logo.png" alt="Panini" class="panini-img">
      </div>

    </div>
  </div>
</ion-content>
